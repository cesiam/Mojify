# Google Cloud Build - deploy unified Mojify (single URL)
# Run: gcloud builds submit --config=cloudbuild.yaml
# Optimized: Docker layer caching, E2_HIGHCPU_8 for faster builds

substitutions:
  _REGION: us-central1
  _SERVICE: mojify
  _IMAGE: mojify
  # GCS bucket name for Litestream SQLite replication (create once — see deploy-gcp.sh)
  _GCS_BUCKET: mojify-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8  # 8 vCPUs vs default 1 — much faster npm/pip

steps:
  # Pull previous image for layer cache (ignore error on first build)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/${_IMAGE}:latest || exit 0']
    id: pull-cache

  # Build with cache — reuses layers when unchanged
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE}:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_IMAGE}:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_IMAGE}:latest'
      - '.'
    id: build
    waitFor: ['pull-cache']

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE}:$BUILD_ID']
    id: push
    waitFor: ['build']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - ${_SERVICE}
      - '--image=gcr.io/$PROJECT_ID/${_IMAGE}:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-env-vars=DATABASE_URL=/app/mojify.db,LITESTREAM_GCS_BUCKET=${_GCS_BUCKET}'
      - '--quiet'
    id: deploy
    waitFor: ['push']

  # Set base URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ${_SERVICE} --region=${_REGION} --format='value(status.url)')
        gcloud run services update ${_SERVICE} \
          --region=${_REGION} \
          --update-env-vars=APP_URL=$$URL,FRONTEND_URL=$$URL \
          --quiet
    id: set-url
    waitFor: ['deploy']

images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE}:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/${_IMAGE}:latest'
